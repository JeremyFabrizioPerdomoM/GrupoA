<form id="donacionesForm" class="donaciones-box" method="GET" autocomplete="on">
    <h2>Apoya nuestra causa</h2>

    <div id="montosContainer">
        <button type="button" data-monto="100">L100</button>
        <button type="button" data-monto="300">L300</button>
        <button type="button" data-monto="500">L500</button>
        <button type="button" data-monto="1000">L1000</button>
    </div>

    <input type="text" id="monto" name="monto" placeholder="Otro monto">

    <div id="montoError"></div>

    <select id="donaciones-metodo" name="metodo">
        <option value="">Selecciona método de pago</option>
        <option value="card">Tarjeta de crédito</option>
        <option value="paypal">PayPal</option>
    </select>

    <div id="metodoError"></div>

    <!-- CARD -->
    <div id="cardFields" class="payment-fields" style="display:none;">
        <input id="cardNumber" type="text" placeholder="Número de tarjeta">
        <input id="cardName" type="text" placeholder="Nombre en la tarjeta">
        <input id="cardExpiry" type="text" placeholder="MM/AA">
        <input id="cardCVV" type="text" placeholder="CVV">
    </div>

    <!-- PAYPAL -->
    <div id="paypalFields" class="payment-fields" style="display:none;">
        <input id="paypalEmail" name="email" type="email" placeholder="Correo de PayPal" autocomplete="email">
    </div>

    <button type="submit" id="btnDonar">Donar ahora</button>

    <p id="donaciones-mensaje"></p>
</form>

<footer>© 2026 Organización XYZ</footer>
<script src="js/App.js"></script>
</body>
